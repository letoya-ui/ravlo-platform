name: EAS Build — Ravlo Investor

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
  push:
    branches:
      - main
    paths:
      - 'mobile/ravlo-investor/**'

jobs:
  build:
    name: Build Ravlo Investor APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/ravlo-investor
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/ravlo-investor/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS Build
        run: eas build --platform android --profile ${{ github.event.inputs.profile || 'preview' }} --non-interactive
        env:
          EXPO_PUBLIC_API_URL: https://ravlohq.com
