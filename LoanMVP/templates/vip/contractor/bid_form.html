{% extends "layouts/ravlo_base.html" %}

{% block title %}Ravlo • New Bid{% endblock %}
{% block page_title %}{{ header_name }}{% endblock %}
{% block page_subline %}Send a bid{% endblock %}

{% block topbar_actions %}
  <a href="{{ url_for('vip.contractor_bids') }}" class="ravlo-btn ghost sm">All bids</a>
  <a href="{{ url_for('vip.contractor_dashboard') }}" class="ravlo-btn ghost sm">Dashboard</a>
{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
  <form method="POST" action="{{ url_for('vip.contractor_bid_new') }}"
        class="ravlo-card pad space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div>
      <label class="ravlo-label">Prospect name *</label>
      <input type="text" name="prospect_name" required maxlength="200" class="ravlo-input" />
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
      <div>
        <label class="ravlo-label">Email</label>
        <input type="email" name="prospect_email" maxlength="255" class="ravlo-input" />
      </div>
      <div>
        <label class="ravlo-label">Phone</label>
        <input type="text" name="prospect_phone" maxlength="50" class="ravlo-input" />
      </div>
    </div>

    <div>
      <label class="ravlo-label">Address</label>
      <input type="text" name="address" maxlength="255" class="ravlo-input" />
    </div>

    <div>
      <label class="ravlo-label">Scope</label>
      <textarea name="scope_text" rows="4" class="ravlo-input"></textarea>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
      <div>
        <label class="ravlo-label">Labor ($)</label>
        <input type="number" step="0.01" name="labor_cost" value="0" class="ravlo-input" />
      </div>
      <div>
        <label class="ravlo-label">Materials ($)</label>
        <input type="number" step="0.01" name="materials_cost" value="0" class="ravlo-input" />
      </div>
      <div>
        <label class="ravlo-label">Other ($)</label>
        <input type="number" step="0.01" name="other_cost" value="0" class="ravlo-input" />
      </div>
    </div>

    <div>
      <label class="ravlo-label">Timeline</label>
      <input type="text" name="timeline" maxlength="120" placeholder="e.g. 6-8 weeks"
             class="ravlo-input" />
    </div>

    <div>
      <label class="ravlo-label">Notes</label>
      <textarea name="notes" rows="3" class="ravlo-input"></textarea>
    </div>

    <div class="flex items-center justify-between gap-2">
      <label class="inline-flex items-center gap-2 text-sm text-gray-300">
        <input type="checkbox" name="send_now" value="1">
        Mark as sent now
      </label>
      <div class="flex gap-2">
        <a href="{{ url_for('vip.contractor_bids') }}" class="ravlo-btn ghost sm">Cancel</a>
        <button type="submit" class="ravlo-btn primary sm">Save bid</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
