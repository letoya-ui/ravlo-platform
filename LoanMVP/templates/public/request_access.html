{% extends "layouts/base.html" %}

{% block title %}Request Access{% endblock %}

{% block content %}
<div class="auth-card" style="max-width:700px;margin:40px auto;">
  <h2>Request Access</h2>
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label>Contact Name</label>
      <input type="text" name="contact_name" required>
    </div>

    <div class="form-group">
      <label>Company Name</label>
      <input type="text" name="company_name">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required>
    </div>

    <div class="form-group">
      <label>Phone</label>
      <input type="text" name="phone">
    </div>

    <div class="form-group">
      <label>Request Type</label>
      <select name="request_type">
        <option value="company_setup">Company Setup</option>
        <option value="subscription">Subscription</option>
        <option value="employee_access">Employee Access</option>
        <option value="demo">Demo</option>
      </select>
    </div>

    <div class="form-group">
      <label>Requested Role</label>
      <input type="text" name="requested_role" placeholder="Optional">
    </div>

    <div class="form-group">
      <label>Notes</label>
      <textarea name="notes" rows="4"></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Submit Request</button>
  </form>
</div>
{% endblock %}
