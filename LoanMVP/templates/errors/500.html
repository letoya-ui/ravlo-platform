<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Server Error</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #071018 0%, #0d1722 100%);
      color: #eef4fb;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      width: min(560px, calc(100vw - 32px));
      padding: 32px;
      border-radius: 24px;
      background: rgba(15, 25, 37, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
    }
    .eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      font-weight: 800;
      text-transform: uppercase;
      color: #8ec5ff;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }
    p {
      margin: 0;
      line-height: 1.7;
      color: #b8c8d8;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Ravlo</div>
    <h1>Something went wrong.</h1>
    <p>The issue has been logged. Please try again in a moment.</p>
  </main>
</body>
</html>
