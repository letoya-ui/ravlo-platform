{% extends "layouts/Ravlo_lending_base.html" %}
{% block title %}Loan Officer • AI Generator{% endblock %}
{% block content %}

<

<div class="container py-4">
  <h2>🤖 AI Generator</h2>
  <p class="muted">Generate borrower summaries, emails, or loan insights instantly.</p>

  <div class="card">
    <form method="POST">
      <textarea name="prompt" placeholder="Type your request here... (e.g., 'Summarize borrower loan readiness')"></textarea>
      <button type="submit" class="btn mt-2">⚡ Generate</button>
    </form>

    {% if ai_reply %}
    <div class="output-box mt-3">
      <button class="copy-btn" onclick="copyAI()">📋 Copy</button>
      <h4>AI Output</h4>
      <div id="aiText">{{ ai_reply }}</div>
    </div>
    {% endif %}
  </div>
</div>

<script>
function copyAI() {
  const text = document.getElementById('aiText').innerText;
  navigator.clipboard.writeText(text);
  alert("Copied to clipboard!");
}
</script>
{% endblock %}
