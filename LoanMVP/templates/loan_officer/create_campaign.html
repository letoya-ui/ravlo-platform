{% extends "layouts/ravlo_employee_base.html" %}
{% block title %}Create Campaign{% endblock %}
{% block content %}

<main class="dashboard-main">

<div class="wrap">
  <div class="card">
    <h2><i class="lucide lucide-megaphone"></i> Create New Campaign</h2>
    <p class="muted">Define a new marketing or communication campaign to reach borrowers, leads, or partners.</p>

    <form method="POST" action="{{ url_for('loan_officer.create_campaign') }}">
      <label for="name">Campaign Name</label>
      <input type="text" id="name" name="name" placeholder="Enter campaign name" required>

      <label for="description">Description</label>
      <textarea id="description" name="description" placeholder="Brief summary or objective"></textarea>

      <label for="channel">Channel</label>
      <select id="channel" name="channel">
        <option value="email">Email</option>
        <option value="sms">SMS</option>
        <option value="phone">Phone Outreach</option>
        <option value="social">Social Media</option>
        <option value="ai">AI-Generated</option>
      </select>

      <label for="status">Status</label>
      <select id="status" name="status">
        <option value="draft">Draft</option>
        <option value="active">Active</option>
        <option value="paused">Paused</option>
        <option value="completed">Completed</option>
      </select>

      <div class="actions">
        <a href="{{ url_for('loan_officer.campaigns') }}" class="btn">← Cancel</a>
        <button type="submit" class="btn btn-primary">💾 Save Campaign</button>
      </div>
    </form>
  </div>
</div>

</main>
{% endblock %}
