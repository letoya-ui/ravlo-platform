{% extends "layouts/ravlo_employee_base.html" %}
{% block title %}New Loan{% endblock %}
{% block content %}

<div class="card">
  <div class="header">
    <h2>📝 Create New Loan</h2>
    <p class="text-muted">Enter borrower and loan details below.</p>
  </div>

  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="borrower_id">Borrower</label>
    <select name="borrower_id" required>
      <option value="">-- Select Borrower --</option>
      {% for b in borrowers %}
      <option value="{{ b.id }}">{{ b.full_name }}</option>
      {% endfor %}
    </select>

    <label for="loan_type">Loan Type</label>
    <input type="text" name="loan_type" placeholder="e.g. Commercial, Residential" required>

    <label for="amount">Amount</label>
    <input type="number" name="amount" step="0.01" placeholder="Enter loan amount" required>

    <label for="status">Status</label>
    <select name="status">
      <option value="pending">Pending</option>
      <option value="active">Active</option>
      <option value="approved">Approved</option>
      <option value="declined">Declined</option>
    </select>

    <div style="display:flex; justify-content:space-between; margin-top:1.5rem;">
      <a href="{{ url_for('loan_officer.loan_queue') }}" class="btn" style="background:#333;color:#fff;">← Back</a>
      <button type="submit" class="btn">💾 Save Loan</button>
    </div>
  </form>
</div>
{% endblock %}
