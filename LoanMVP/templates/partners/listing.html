{% extends "layouts/ravlo_base.html" %}
{% set active_page = "listing" %}

{% block page_title %}Marketplace Listing{% endblock %}
{% block page_subline %}Control how investors see your profile in the Ravlo marketplace.{% endblock %}

{% block content %}
<div class="ravlo-card pad">
    <form method="POST">

        <label>Bio</label>
        <textarea name="bio" class="ravlo-input" rows="4">{{ partner.bio }}</textarea>

        <label>Specialty</label>
        <input name="specialty" class="ravlo-input" value="{{ partner.specialty }}"/>

        <label>Service Area</label>
        <input name="service_area" class="ravlo-input" value="{{ partner.service_area }}"/>

        <label>Listing Description</label>
        <textarea name="listing_description" class="ravlo-input" rows="4">{{ partner.listing_description }}</textarea>

        <label>Logo URL</label>
        <input name="logo_url" class="ravlo-input" value="{{ partner.logo_url }}"/>

        <label>Subscription Tier</label>
        <select name="subscription_tier" class="ravlo-input">
            <option value="Free" {% if partner.subscription_tier == "Free" %}selected{% endif %}>Free</option>
            <option value="Featured" {% if partner.subscription_tier == "Featured" %}selected{% endif %}>Featured</option>
            <option value="Premium" {% if partner.subscription_tier == "Premium" %}selected{% endif %}>Premium</option>
        </select>

        <button class="ravlo-button primary" style="margin-top:20px;">Save Listing</button>
    </form>
</div>
{% endblock %}
