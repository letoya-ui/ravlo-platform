{% extends "layouts/ravlo_base.html" %}
{% block content %}

<div class="partner-register-shell">

    <h1>Create Your Partner Profile</h1>

    <form method="POST" class="partner-register-form">

        <label>Role</label>
        <select name="role" required>
            <option value="">Select role...</option>
            <option value="contractor">Contractor</option>
            <option value="realtor">Realtor</option>
            <option value="designer">Designer</option>
            <option value="inspector">Inspector</option>
            <option value="appraiser">Appraiser</option>
            <option value="title">Title</option>
            <option value="insurance">Insurance</option>
            <option value="attorney">Attorney</option>
            <option value="property_manager">Property Manager</option>
            <option value="cleaner">Cleaner</option>
        </select>

        <label>Company</label>
        <input type="text" name="company" required>

        <label>Specialty</label>
        <input type="text" name="specialty">

        <label>Service Area</label>
        <input type="text" name="service_area">

        <label>Bio</label>
        <textarea name="bio" rows="5"></textarea>

        <button type="submit" class="btn-primary">Create Profile</button>

    </form>

</div>

<h3>Photos</h3>

<form method="POST" action="{{ url_for('partners.upload_photo') }}" enctype="multipart/form-data">
    <input type="file" name="photo" required>
    <button class="btn-primary">Upload Photo</button>
</form>

<div class="photo-grid">
    {% for photo in partner.photos %}
    <div class="photo-item">
        <img src="{{ photo.url }}" alt="Partner photo">

        <form method="POST" action="{{ url_for('partners.delete_photo', photo_id=photo.id) }}">
            <button class="btn-secondary small">Delete</button>
        </form>
    </div>
    {% endfor %}
</div>


{% endblock %}
