{% extends "layouts/ravlo_base.html" %}

{% block content %}

<h2>New Construction Deal Builder</h2>

<div class="builder-section">
    <label>Land Photo</label>
    <input type="text" id="land-image-url" placeholder="Paste image URL">
</div>

<div class="builder-section">
    <label>Describe Your Idea</label>
    <textarea id="idea-description" rows="4"></textarea>
</div>

<div class="builder-section">
    <label>Style</label>
    <select id="build-style">
        <option value="modern">Modern</option>
        <option value="farmhouse">Farmhouse</option>
        <option value="luxury">Luxury</option>
        <option value="adu">ADU</option>
        <option value="duplex">Duplex</option>
        <option value="tiny_home">Tiny Home</option>
    </select>
</div>

<button onclick="generateConcept()">Generate Concept</button>

<div id="results"></div>

<script>
async function generateConcept() {
    const land = document.getElementById("land-image-url").value;
    const desc = document.getElementById("idea-description").value;
    const style = document.getElementById("build-style").value;

    const res = await fetch("/investor/deals/new/concept/generate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            land_image_url: land,
            description: desc,
            style: style
        })
    });

    const data = await res.json();

    document.getElementById("results").innerHTML = `
        <h3>Concept Render</h3>
        <img src="${data.concept_image}" class="result-img">

        <h3>Blueprint</h3>
        <img src="${data.blueprint_image}" class="result-img">

        <h3>Site Plan</h3>
        <img src="${data.site_plan_image}" class="result-img">

        <button onclick='saveDeal(${JSON.stringify(data)})'>Save Deal</button>
    `;
}

async function saveDeal(data) {
    const res = await fetch("/investor/deals/new/concept/save", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const out = await res.json();
    window.location.href = `/investor/deals/${out.deal_id}/workspace`;
}
</script>

{% endblock %}
