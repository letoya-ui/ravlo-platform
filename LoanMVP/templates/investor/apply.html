{% extends "layouts/ravlo_base.html" %}
{% block title %}Full Capital Application | Investor{% endblock %}
{% block content %}

<!-- ==========================================================
     RAVLO • Apply Page Styles + Script
     Drop into: templates/investor/apply.html
     Works with your dashboard.css tokens (bg/panel/line/text/muted/accent)
========================================================== -->

<style>
  .ap-wrap{margin-top:1rem;}

  /* Hero */
  .ap-hero{
    position:relative;
    border-radius:18px;
    overflow:hidden;
    border:1px solid var(--line, rgba(255,255,255,.10));
    background:
      radial-gradient(900px 460px at 18% 12%, rgba(122,184,255,.14), transparent 55%),
      radial-gradient(700px 420px at 86% 8%, rgba(122,184,255,.08), transparent 55%),
      linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,.25));
    box-shadow: 0 0 26px rgba(0,0,0,.55);
    padding: 1.05rem 1.1rem;
    display:flex; align-items:flex-end; justify-content:space-between;
    gap:1rem; flex-wrap:wrap;
  }
  .ap-hero h2{margin:0; font-size:1.35rem;}
  .ap-hero p{margin:.35rem 0 0; color:var(--muted);}
  .ap-actions{display:flex; gap:.5rem; flex-wrap:wrap; align-items:center;}

  /* Buttons */
  .ap-btn{
    background: rgba(122,184,255,0.12);
    border: 1px solid rgba(122,184,255,0.45);
    color: #7ab8ff;
    padding: .62rem .9rem;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 750;
    transition: .18s;
    font-size: .9rem;
    text-decoration:none;
    display:inline-flex; align-items:center; gap:.45rem;
  }
  .ap-btn:hover{
    background: rgba(122,184,255,0.22);
    border-color:#7ab8ff;
    box-shadow:0 0 14px rgba(122,184,255,.35);
  }
  .ap-btn.ghost{
    background: rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.12);
    color: var(--text);
  }
  .ap-btn.primary{
    background: rgba(122,184,255,0.20);
    border-color: rgba(122,184,255,0.60);
  }

  /* Layout */
  .ap-grid{
    display:grid;
    grid-template-columns: 1.25fr .95fr;
    gap:1rem;
    margin-top:1rem;
  }
  @media(max-width:1100px){ .ap-grid{grid-template-columns:1fr;} }

  .ap-card{
    background: var(--panel, #0b1016);
    border: 1px solid var(--line, rgba(255,255,255,0.10));
    border-radius: 16px;
    padding: 1rem 1.05rem;
    box-shadow: 0 0 18px rgba(0,0,0,0.45);
  }
  .ap-card h3{margin:.1rem 0 .85rem; color:var(--accent, #7ab8ff); font-size:1.05rem;}
  .ap-muted{color:var(--muted);}

  /* Progress */
  .ap-progress{
    display:flex; align-items:center; justify-content:space-between;
    gap:.75rem; flex-wrap:wrap;
    margin:.25rem 0 .85rem;
  }
  .ap-steps{display:flex; gap:.5rem; flex-wrap:wrap;}
  .ap-step{
    font-size:.78rem;
    border-radius:999px;
    padding:.28rem .55rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.10);
    color: rgba(255,255,255,.85);
    display:inline-flex; gap:.4rem; align-items:center;
  }
  .ap-step.active{
    background: rgba(122,184,255,0.18);
    border-color: rgba(122,184,255,0.40);
    color:#a9d2ff;
    box-shadow: 0 0 14px rgba(122,184,255,.18);
  }
  .ap-bar{
    width: 240px;
    max-width: 100%;
    height: 10px;
    border-radius:999px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.10);
    overflow:hidden;
  }
  .ap-bar > div{
    height:100%;
    width: 0%;
    background: rgba(122,184,255,0.65);
    box-shadow: 0 0 18px rgba(122,184,255,.28);
    transition: width .2s ease;
  }

  /* Form controls */
  .ap-row{display:grid; grid-template-columns: 1fr 1fr; gap:.85rem;}
  @media(max-width:720px){ .ap-row{grid-template-columns:1fr;} }

  .ap-field label{
    display:block;
    font-size:.82rem;
    color:var(--muted);
    margin: 0 0 .35rem;
  }
  .ap-input, .ap-select, .ap-textarea{
    width:100%;
    border-radius: 12px;
    padding: .7rem .8rem;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.10);
    color: var(--text);
    outline:none;
  }
  .ap-input:focus, .ap-select:focus, .ap-textarea:focus{
    border-color: rgba(122,184,255,0.45);
    box-shadow: 0 0 0 3px rgba(122,184,255,0.12);
  }
  .ap-textarea{min-height: 120px; resize:vertical;}
  .ap-help{margin:.35rem 0 0; font-size:.78rem; color:var(--muted);}

  /* Tiles */
  .ap-tiles{display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap:.65rem;}
  @media(max-width:820px){ .ap-tiles{grid-template-columns: repeat(2, minmax(0,1fr));} }
  @media(max-width:520px){ .ap-tiles{grid-template-columns: 1fr;} }

  .ap-tile{
    padding:.85rem .9rem;
    border-radius: 16px;
    background: rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.10);
    cursor:pointer;
    transition:.15s;
    display:flex; gap:.6rem; align-items:flex-start;
  }
  .ap-tile:hover{transform: translateY(-1px); border-color: rgba(122,184,255,0.22);}
  .ap-tile.active{
    background: rgba(122,184,255,0.14);
    border-color: rgba(122,184,255,0.40);
    box-shadow: 0 0 16px rgba(122,184,255,.18);
  }
  .ap-tile b{display:block; margin-bottom:.2rem;}
  .ap-icon{
    width:34px; height:34px; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    background: rgba(122,184,255,0.12);
    border:1px solid rgba(122,184,255,0.24);
    color:#a9d2ff;
    flex:0 0 auto;
  }

  /* Summary sidebar */
  .ap-summary{
    display:grid; gap:.6rem;
  }
  .ap-sum{
    border-radius: 14px;
    padding:.85rem .9rem;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.10);
  }
  .ap-sum .k{color:var(--muted); font-size:.78rem;}
  .ap-sum .v{font-size:1.02rem; font-weight:850; margin-top:.22rem;}

  /* Inline alert */
  .ap-alert{
    margin-top:.85rem;
    padding:.75rem .85rem;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.10);
    color: rgba(255,255,255,.88);
  }
</style>

<script>
/* ==========================================================
   Apply Page JS (Ravlo)
   - strategy tiles selection
   - progress bar + step highlighting
   - optional: auto-fill from query params
========================================================== */
(function(){
  const $ = (sel, root=document) => root.querySelector(sel);
  const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

  const state = {
    step: 1,
    stepsTotal: 3,
    strategy: ""
  };

  function setStep(n){
    state.step = Math.max(1, Math.min(state.stepsTotal, Number(n)||1));
    $$(".ap-step").forEach((s, idx)=> s.classList.toggle("active", (idx+1) === state.step));
    const pct = Math.round((state.step / state.stepsTotal) * 100);
    const bar = $("#apBarFill");
    if(bar) bar.style.width = pct + "%";
    const stepTxt = $("#apStepText");
    if(stepTxt) stepTxt.textContent = `Step ${state.step} of ${state.stepsTotal}`;
  }

  function setStrategy(key){
    state.strategy = key || "";
    $$(".ap-tile").forEach(t => t.classList.toggle("active", t.dataset.strategy === state.strategy));
    const hidden = $("#apStrategy");
    if(hidden) hidden.value = state.strategy;

    // update summary
    const s = $("#apSumStrategy");
    if(s) s.textContent = state.strategy ? state.strategy.toUpperCase() : "—";
  }

  function syncSummary(){
    const price = $("#apPurchase")?.value;
    const loan = $("#apLoanAmount")?.value;
    const arv = $("#apARV")?.value;

    if($("#apSumPurchase")) $("#apSumPurchase").textContent = price ? "$" + Number(price).toLocaleString() : "—";
    if($("#apSumLoan")) $("#apSumLoan").textContent = loan ? "$" + Number(loan).toLocaleString() : "—";
    if($("#apSumARV")) $("#apSumARV").textContent = arv ? "$" + Number(arv).toLocaleString() : "—";
  }

  // Strategy tile clicks
  $$(".ap-tile").forEach(tile => {
    tile.addEventListener("click", ()=> setStrategy(tile.dataset.strategy || ""));
  });

  // Step nav buttons (optional)
  $("#apNext")?.addEventListener("click", ()=> setStep(state.step + 1));
  $("#apBack")?.addEventListener("click", ()=> setStep(state.step - 1));

  // Summary inputs
  ["apPurchase","apLoanAmount","apARV"].forEach(id=>{
    $("#"+id)?.addEventListener("input", syncSummary);
  });

  // Query param prefill (optional)
  try{
    const url = new URL(window.location.href);
    const strat = url.searchParams.get("strategy");
    if(strat) setStrategy(strat);
  }catch(e){}

  // Init
  setStep(1);
  syncSummary();
})();
</script>

<!-- ==========================================================
  OPTIONAL MARKUP SKELETON (if you want)
  If you already have your HTML, KEEP IT and only use the style+script.
==========================================================

<div class="ap-wrap">

  <div class="ap-hero">
    <div>
      <h2>🏦 Apply for Funding</h2>
      <p>Tell us about your deal — we’ll route you to the best option for your strategy.</p>
    </div>
    <div class="ap-actions">
      <a class="ap-btn ghost" href="{{ url_for('investor.deals_list') }}">🗂️ Deals</a>
      <button class="ap-btn primary" type="submit" form="applyForm">🚀 Submit</button>
    </div>
  </div>

  <div class="ap-grid">

    <div class="ap-card">
      <div class="ap-progress">
        <div class="ap-steps">
          <span class="ap-step active">1 • Deal</span>
          <span class="ap-step">2 • Borrower</span>
          <span class="ap-step">3 • Upload</span>
        </div>
        <div style="display:flex; gap:.6rem; align-items:center;">
          <span class="ap-muted" id="apStepText">Step 1 of 3</span>
          <div class="ap-bar"><div id="apBarFill"></div></div>
        </div>
      </div>

      <form id="applyForm" method="POST" action="{{ url_for('investor.apply') }}" enctype="multipart/form-data">
        {% if csrf_token is defined %}<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">{% endif %}
        <input type="hidden" name="strategy" id="apStrategy" value="">

        <h3>Deal Type</h3>
        <div class="ap-tiles">
          <div class="ap-tile" data-strategy="flip">
            <div class="ap-icon">🏚️</div>
            <div><b>Fix & Flip</b><div class="ap-muted">Short-term rehab + resale</div></div>
          </div>
          <div class="ap-tile" data-strategy="rental">
            <div class="ap-icon">🏢</div>
            <div><b>Rental</b><div class="ap-muted">DSCR / long-term hold</div></div>
          </div>
          <div class="ap-tile" data-strategy="airbnb">
            <div class="ap-icon">🌙</div>
            <div><b>Short-Term Rental</b><div class="ap-muted">STR / Airbnb focus</div></div>
          </div>
        </div>

        <div class="ap-row" style="margin-top:1rem;">
          <div class="ap-field">
            <label>Property Address</label>
            <input class="ap-input" name="address" placeholder="123 Main St, City, ST">
          </div>
          <div class="ap-field">
            <label>State</label>
            <input class="ap-input" name="state" placeholder="NY">
          </div>
        </div>

        <div class="ap-row" style="margin-top:.85rem;">
          <div class="ap-field">
            <label>Purchase Price</label>
            <input id="apPurchase" class="ap-input" type="number" name="purchase_price" placeholder="e.g., 175000">
          </div>
          <div class="ap-field">
            <label>Requested Loan Amount</label>
            <input id="apLoanAmount" class="ap-input" type="number" name="loan_amount" placeholder="e.g., 140000">
          </div>
        </div>

        <div class="ap-row" style="margin-top:.85rem;">
          <div class="ap-field">
            <label>After Repair Value (ARV)</label>
            <input id="apARV" class="ap-input" type="number" name="arv" placeholder="e.g., 260000">
            <div class="ap-help">If unknown, leave blank — we’ll estimate.</div>
          </div>
          <div class="ap-field">
            <label>Timeline</label>
            <select class="ap-select" name="timeline">
              <option value="">Select…</option>
              <option>0–30 days</option>
              <option>30–60 days</option>
              <option>60–90 days</option>
              <option>90+ days</option>
            </select>
          </div>
        </div>

        <div class="ap-field" style="margin-top:.85rem;">
          <label>Notes</label>
          <textarea class="ap-textarea" name="notes" placeholder="Anything we should know?"></textarea>
        </div>

        <div class="ap-alert">
          <b>Tip:</b> If this deal is already saved, attach it to the application so your docs + results stay together.
        </div>

        <div style="display:flex; gap:.5rem; justify-content:flex-end; margin-top:1rem; flex-wrap:wrap;">
          <button class="ap-btn ghost" type="button" id="apBack">Back</button>
          <button class="ap-btn" type="button" id="apNext">Next</button>
          <button class="ap-btn primary" type="submit">Submit</button>
        </div>
      </form>
    </div>

    <div class="ap-card">
      <h3>Application Summary</h3>
      <div class="ap-summary">
        <div class="ap-sum"><div class="k">Strategy</div><div class="v" id="apSumStrategy">—</div></div>
        <div class="ap-sum"><div class="k">Purchase</div><div class="v" id="apSumPurchase">—</div></div>
        <div class="ap-sum"><div class="k">Requested Loan</div><div class="v" id="apSumLoan">—</div></div>
        <div class="ap-sum"><div class="k">ARV</div><div class="v" id="apSumARV">—</div></div>
      </div>

      <div style="margin-top:1rem;">
        <h3>What happens next</h3>
        <p class="ap-muted" style="margin:.35rem 0 0;">
          We review your inputs, confirm deal viability, then send a request list + next steps.
        </p>
      </div>
    </div>

  </div>
</div>

</form>

  </div>

</main>

{% endblock %}
