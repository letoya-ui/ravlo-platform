{% extends "layouts/ravlo_base.html" %}

{% block title %}Ravlo • Loan Quote{% endblock %}
{% block page_title %}Loan Quote{% endblock %}
{% block page_subline %}Run a quick quote scenario before you move into a full capital application.{% endblock %}

{% block content %}
<div class="ravlo-card pad" style="max-width:960px; margin:0 auto;">
  <form method="POST" action="{{ url_for('investor.quote') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="ravlo-grid cols-2">
      <div>
        <label class="ravlo-label">Loan Amount</label>
        <input class="ravlo-input" type="number" step="0.01" name="loan_amount" placeholder="350000" required>
      </div>
      <div>
        <label class="ravlo-label">Property Value</label>
        <input class="ravlo-input" type="number" step="0.01" name="property_value" placeholder="500000" required>
      </div>
      <div>
        <label class="ravlo-label">Property Address</label>
        <input class="ravlo-input" type="text" name="property_address" placeholder="123 Oakwood Dr, Tampa, FL">
      </div>
      <div>
        <label class="ravlo-label">Property Type</label>
        <input class="ravlo-input" type="text" name="property_type" placeholder="Single Family">
      </div>
      <div>
        <label class="ravlo-label">Loan Type</label>
        <select class="ravlo-input" name="loan_type">
          <option value="Conventional">Conventional</option>
          <option value="Fix & Flip">Fix & Flip</option>
          <option value="Bridge">Bridge</option>
          <option value="DSCR">DSCR</option>
          <option value="Construction">Construction</option>
        </select>
      </div>
      <div>
        <label class="ravlo-label">Loan Category</label>
        <select class="ravlo-input" name="loan_category">
          <option value="Purchase">Purchase</option>
          <option value="Refinance">Refinance</option>
          <option value="Cash-Out">Cash-Out</option>
        </select>
      </div>
      <div>
        <label class="ravlo-label">Term (months)</label>
        <input class="ravlo-input" type="number" name="term_months" value="360">
      </div>
      <div>
        <label class="ravlo-label">FICO Score</label>
        <input class="ravlo-input" type="number" name="fico_score" value="700">
      </div>
      <div class="cols-2" style="grid-column:1 / -1;">
        <label class="ravlo-label">Experience</label>
        <select class="ravlo-input" name="experience">
          <option value="New Investor">New Investor</option>
          <option value="Growing Portfolio">Growing Portfolio</option>
          <option value="Experienced Operator">Experienced Operator</option>
        </select>
      </div>
    </div>

    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:18px;">
      <button class="ravlo-btn primary" type="submit">Generate Quotes</button>
      <button class="ravlo-btn ghost" type="button" onclick="location.href='{{ url_for('investor.capital_application') }}'">Skip to Capital Application</button>
    </div>
  </form>
</div>
{% endblock %}
