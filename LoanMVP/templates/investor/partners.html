<section class="ravlo-card partner-filter-card">
  <form method="GET" action="{{ url_for('investor.partners') }}" class="partner-filter-form">
    <div class="section-head">
      <div>
        <div class="eyebrow">DISCOVER</div>
        <h3>Find a Partner</h3>
      </div>
    </div>

    <div class="partner-filter-grid partner-filter-grid-v2">
      <div class="partner-field">
        <label class="ravlo-label">Company / Partner Name</label>
        <input
          type="text"
          name="company"
          value="{{ selected_company }}"
          class="ravlo-input"
          placeholder="Company or partner name..."
        >
      </div>

      <div class="partner-field">
        <label class="ravlo-label">Keyword</label>
        <input
          type="text"
          name="keyword"
          value="{{ selected_keyword }}"
          class="ravlo-input"
          placeholder="Specialty, service, type..."
        >
      </div>

      <div class="partner-field">
        <label class="ravlo-label">Category</label>
        <select name="category" class="ravlo-input">
          <option value="">All</option>
          {% for item in categories %}
            <option value="{{ item }}" {% if selected_category == item %}selected{% endif %}>{{ item }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="partner-field">
        <label class="ravlo-label">Relationship</label>
        <select name="relationship_level" class="ravlo-input">
          <option value="">All</option>
          {% for item in relationship_levels %}
            <option value="{{ item }}" {% if selected_relationship_level == item %}selected{% endif %}>{{ item }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="partner-field">
        <label class="ravlo-label">City</label>
        <input
          type="text"
          name="city"
          value="{{ selected_city }}"
          class="ravlo-input"
          placeholder="Tampa, Orlando..."
        >
      </div>

      <div class="partner-field">
        <label class="ravlo-label">State</label>
        <input
          type="text"
          name="state"
          value="{{ selected_state }}"
          class="ravlo-input"
          placeholder="FL, NY..."
        >
      </div>

      <div class="partner-field">
        <label class="ravlo-label">ZIP Code</label>
        <input
          type="text"
          name="zip_code"
          value="{{ selected_zip_code }}"
          class="ravlo-input"
          placeholder="33602..."
        >
      </div>
    </div>

    <div class="partner-action-row">
      <button type="submit" class="ravlo-btn primary">Search Partners</button>
      <a href="{{ url_for('investor.partners') }}" class="ravlo-btn ghost">Reset</a>
    </div>
  </form>
</section>
