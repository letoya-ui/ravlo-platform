<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ravlo Academy OS</title>

  {# Portal is an authenticated app shell — Google shouldn't index it #}
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0C1116; }
    #ravlo-university-root { min-height: 100%; }

    .ru-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background:
        radial-gradient(circle at top, rgba(58,92,122,.24), transparent 38%),
        linear-gradient(180deg, #0C1116 0%, #11161C 100%);
      color: #A7A9AC;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      gap: 12px;
    }
    .ru-spinner {
      width: 22px;
      height: 22px;
      border: 2px solid rgba(58,92,122,.22);
      border-top-color: #3A5C7A;
      border-radius: 50%;
      animation: ru-spin .8s linear infinite;
      box-shadow: 0 0 24px rgba(58,92,122,.28);
    }
    @keyframes ru-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="ru-loader" class="ru-loading">
    <div class="ru-spinner"></div>
    Loading Academy OS…
  </div>

  <div id="ravlo-university-root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var loader = document.getElementById('ru-loader');
      var attempts = 0;
      var check = setInterval(function () {
        attempts++;
        var root = document.getElementById('ravlo-university-root');
        if ((root && root.childElementCount > 0) || attempts > 60) {
          if (loader) loader.style.display = 'none';
          clearInterval(check);
        }
      }, 200);
    });
  </script>

  <script>
    window.RAVLO_ACADEMY = {
      tier: {{ server_tier | tojson }},
      userName: {{ server_user | tojson }}
    };
  </script>

  <script type="text/babel"
          data-presets="react"
          src="{{ url_for('static', filename='js/ravlo_university.jsx') }}">
  </script>
</body>
</html>
