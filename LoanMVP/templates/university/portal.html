<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ravlo Academy</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #07111f; font-family: 'Inter', sans-serif; }
    #ravlo-university-root { height: 100%; }

    .ru-grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 10px 10px;
    }

    .ru-loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh;
      background: radial-gradient(circle at top left, rgba(54,115,255,.18), transparent 40%),
                  linear-gradient(180deg, #06101d, #081322);
      color: #9fb1c9;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      gap: 10px;
    }
    .ru-spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(89,183,255,0.2);
      border-top-color: #59B7FF;
      border-radius: 50%;
      animation: ru-spin 0.8s linear infinite;
    }
    @keyframes ru-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="ru-grain"></div>

  <div id="ru-loader" class="ru-loading">
    <div class="ru-spinner"></div>
    Loading Ravlo Academy
  </div>

  <div id="ravlo-university-root"></div>

  <script src="{{ url_for('static', filename='js/vendors/react.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/vendors/react-dom.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/vendors/babel.min.js') }}"></script>

  <script>
    /* Use classic React.createElement runtime — prevents Babel 8 from emitting import statements */
    Babel.registerPreset('react-classic', {
      presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]]
    });
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var loader = document.getElementById('ru-loader');
      var attempts = 0;
      var check = setInterval(function () {
        attempts++;
        var root = document.getElementById('ravlo-university-root');
        if ((root && root.childElementCount > 0) || attempts > 80) {
          if (loader) loader.style.display = 'none';
          clearInterval(check);
        }
      }, 200);
    });
  </script>

  <script>
    window.RAVLO_ACADEMY = {
      tier: {{ server_tier | tojson }},
      userName: {{ server_user | tojson }}
    };
  </script>

  <script type="text/babel"
          data-presets="react-classic"
          src="{{ url_for('static', filename='js/ravlo_university.jsx') }}">
  </script>

</body>
</html>
