{% extends "layouts/borrower_base.html" %}
{% block title %}Ravlo • Edit Deal{% endblock %}
{% block content %}

<div class="page-header">
  <h2>✏️ Edit Deal</h2>
  <p class="text-muted">
    Update your deal title, status, and notes.
  </p>
</div>

<div class="dw-card" style="max-width: 860px; margin: 0 auto;">

  <form method="POST" action="{{ url_for('borrower.deal_edit', deal_id=deal.id) }}">
    {{ csrf_token() if csrf_token is defined }}

    <label class="dw-label">Title</label>
    <input class="dw-input"
           type="text"
           name="title"
           value="{{ deal.title or '' }}"
           placeholder="e.g., 3BR Flip in Middletown"
           required>

    <div class="dw-row" style="margin-top:.75rem;">
      <div>
        <label class="dw-label">Status</label>
        <select class="dw-input" name="status">
          <option value="active" {% if (deal.status or '') == 'active' %}selected{% endif %}>Active</option>
          <option value="archived" {% if (deal.status or '') == 'archived' %}selected{% endif %}>Archived</option>
        </select>
      </div>

      <div>
        <label class="dw-label">Strategy</label>
        <input class="dw-input" type="text" value="{{ deal.strategy or '—' }}" readonly>
      </div>
    </div>

    <label class="dw-label" style="margin-top:.75rem;">Notes</label>
    <textarea class="dw-input"
              name="notes"
              rows="7"
              placeholder="Scope, funding plan, contractor notes, timeline…">{{ deal.notes or '' }}</textarea>

    <div style="margin-top:1rem; display:flex; gap:.75rem; flex-wrap:wrap;">
      <button class="dw-button" type="submit">💾 Save Changes</button>

      <a class="dw-button"
         href="{{ url_for('borrower.deal_detail', deal_id=deal.id) }}"
         style="text-decoration:none; display:inline-flex; align-items:center; justify-content:center;">
        Cancel
      </a>

      <a class="dw-button"
         href="{{ url_for('borrower.deal_open', deal_id=deal.id) }}"
         style="text-decoration:none; display:inline-flex; align-items:center; justify-content:center;">
        Open in Workspace
      </a>
    </div>
  </form>

</div>

{% endblock %}
