<div class="re-brand">
  <div class="re-mark"><span>RV</span></div>
  <div>
    <div class="re-brand-name">Ravlo</div>
    <div class="re-brand-sub">Admin OS</div>
  </div>
</div>

<nav class="re-nav">
  <div class="re-nav-group">
    <div class="re-nav-label">Admin</div>

    <a href="{{ url_for('admin.dashboard') }}" class="re-nav-link {% if active_tab == 'dashboard' %}active{% endif %}">
      <i class="icon lucide lucide-layout-dashboard"></i>
      <span>Dashboard</span>
    </a>

    <a href="{{ url_for('admin.reports') }}" class="re-nav-link {% if active_tab == 'reports' %}active{% endif %}">
      <i class="icon lucide lucide-bar-chart-3"></i>
      <span>Reports</span>
    </a>

    <a href="{{ url_for('admin.messages') }}" class="re-nav-link {% if active_tab == 'messages' %}active{% endif %}">
      <i class="icon lucide lucide-messages-square"></i>
      <span>Messages</span>
    </a>
  </div>
</nav>

<div class="re-sidebar-foot">
  <div class="re-user-chip">
    <div class="re-user-avatar">
      {{ (current_user.first_name[0] if current_user.first_name else "A")|upper }}
    </div>
    <div class="re-user-meta">
      <div class="re-user-name">{{ current_user.first_name or "" }} {{ current_user.last_name or "" }}</div>
      <div class="re-user-role">Admin</div>
    </div>
  </div>
</div>
