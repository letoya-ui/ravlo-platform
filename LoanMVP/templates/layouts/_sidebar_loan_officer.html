<div class="re-brand">
  <div class="re-mark re-mark-rv">
    <span>RV</span>
  </div>
  <div class="re-brand-meta">
    <div class="re-brand-name">Ravlo</div>
    <div class="re-brand-sub">Lending OS</div>
  </div>
</div>

<nav class="re-nav">

  <div class="re-nav-group">
    <div class="re-nav-label">Workspace</div>

    <a href="{{ url_for('loan_officer.dashboard') }}"
       class="re-nav-link {% if active_tab == 'dashboard' %}active{% endif %}">
      <i class="icon lucide lucide-layout-dashboard"></i>
      <span>Dashboard</span>
    </a>

    <a href="{{ url_for('loan_officer.pipeline') }}"
       class="re-nav-link {% if active_tab == 'pipeline' %}active{% endif %}">
      <i class="icon lucide lucide-git-branch"></i>
      <span>Pipeline</span>
    </a>

    <a href="{{ url_for('loan_officer.borrowers') }}"
       class="re-nav-link {% if active_tab == 'borrowers' %}active{% endif %}">
      <i class="icon lucide lucide-users"></i>
      <span>Borrowers</span>
    </a>

    <a href="{{ url_for('loan_officer.leads') }}"
       class="re-nav-link {% if active_tab == 'leads' %}active{% endif %}">
      <i class="icon lucide lucide-user-plus"></i>
      <span>Leads</span>
    </a>

    <a href="{{ url_for('loan_officer.task') }}"
       class="re-nav-link {% if active_tab == 'tasks' %}active{% endif %}">
      <i class="icon lucide lucide-list-todo"></i>
      <span>Tasks</span>
    </a>
  </div>

  <div class="re-nav-group">
    <div class="re-nav-label">Tools</div>

    <a href="{{ url_for('loan_officer.quote_engine') }}"
       class="re-nav-link {% if active_tab == 'quote_engine' %}active{% endif %}">
      <i class="icon lucide lucide-calculator"></i>
      <span>Quote Engine</span>
    </a>

    <a href="{{ url_for('loan_officer.resources') }}"
       class="re-nav-link {% if active_tab == 'resources' %}active{% endif %}">
      <i class="icon lucide lucide-library"></i>
      <span>Resources</span>
    </a>

    <a href="{{ url_for('loan_officer.reports') }}"
       class="re-nav-link {% if active_tab == 'reports' %}active{% endif %}">
      <i class="icon lucide lucide-bar-chart-3"></i>
      <span>Reports</span>
    </a>
  </div>

</nav>

<div class="re-sidebar-foot">
  <div class="re-user-chip">
    <div class="re-user-avatar">
      {{ (current_user.first_name[0] if current_user.first_name else "L")|upper }}
    </div>
    <div class="re-user-meta">
      <div class="re-user-name">
        {{ current_user.first_name or "" }} {{ current_user.last_name or "" }}
      </div>
      <div class="re-user-role">Loan Officer</div>
    </div>
  </div>
</div>
