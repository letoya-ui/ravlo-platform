{% set ep = request.endpoint or "" %}

<div class="ravlo-sidebar-inner">

  <!-- BRAND -->
  <div class="ravlo-sidebar-brand">
    <a href="{{ url_for('loan_officer.dashboard') }}" class="ravlo-brand-link">
      <div class="ravlo-brand-mark">
        <span>RV</span>
      </div>

      <div class="ravlo-brand-copy">
        <div class="ravlo-brand-name">RAVLO</div>
        <div class="ravlo-brand-sub">Lending OS</div>
      </div>
    </a>
    <div class="ravlo-brand-glow"></div>
  </div>

  <nav class="ravlo-sidebar-nav">

    <!-- COMMAND -->
    <div class="ravlo-nav-section">Command</div>

    <a href="{{ url_for('loan_officer.dashboard') }}"
       class="ravlo-nav-link {% if ep == 'loan_officer.dashboard' %}active{% endif %}">
      <i class="lucide lucide-layout-dashboard"></i>
      <span>Dashboard</span>
    </a>

    <a href="{{ url_for('loan_officer.messages') }}"
       class="ravlo-nav-link {% if ep == 'loan_officer.messages' %}active{% endif %}">
      <i class="lucide lucide-message-square"></i>
      <span>Messages</span>
    </a>


    <!-- PIPELINE -->
    <div class="ravlo-nav-section">Pipeline</div>

    <a href="{{ url_for( 'crm.leads') }}"
       class="ravlo-nav-link {% if ep == 'crm.leads' %}active{% endif %}">
      <i class="lucide lucide-flame"></i>
      <span>Leads</span>
    </a>

    <a href="{{ url_for('loan_officer.borrowers') }}"
       class="ravlo-nav-link {% if ep == 'loan_officer.borrowers' %}active{% endif %}">
      <i class="lucide lucide-user-round"></i>
      <span>Borrowers</span>
    </a>

    <a href="{{ url_for('loan_officer.loan_queue') }}"
       class="ravlo-nav-link {% if ep == 'loan_officer.loan_queue' %}active{% endif %}">
      <i class="lucide lucide-landmark"></i>
      <span>Loans</span>
    </a>

    <a href="{{ url_for('loan_officer.credit_check') }}"
       class="ravlo-nav-link {% if 'credit' in ep %}active{% endif %}">
      <i class="lucide lucide-badge-check"></i>
      <span>Credit Check</span>
    </a>


    <!-- WORKFLOW -->
    <div class="ravlo-nav-section">Workflow</div>

    <a href="{{ url_for('loan_officer.tasks') }}"
       class="ravlo-nav-link {% if ep == 'loan_officer.tasks' %}active{% endif %}">
      <i class="lucide lucide-list-checks"></i>
      <span>Tasks</span>
    </a>

    <a href="{{ url_for('loan_officer.documents') }}"
       class="ravlo-nav-link {% if ep == 'loan_officer.documents' %}active{% endif %}">
      <i class="lucide lucide-folder"></i>
      <span>Documents</span>
    </a>


    <!-- RESOURCES -->
    <div class="ravlo-nav-section">Resources</div>

    <a href="{{ url_for('loan_officer.resources') }}"
       class="ravlo-nav-link {% if ep == 'loan_officer.resources' %}active{% endif %}">
      <i class="lucide lucide-book-open"></i>
      <span>Resource Center</span>
    </a>

  </nav>


  <!-- SYSTEM -->
  <div class="ravlo-sidebar-footer-simple">

    <div class="ravlo-nav-section">System</div>

    <a href="{{ url_for('loan_officer.settings') }}"
       class="ravlo-nav-link {% if ep == 'loan_officer.settings' %}active{% endif %}">
      <i class="lucide lucide-settings"></i>
      <span>Settings</span>
    </a>

    <form method="post" action="{{ url_for('auth.logout') }}" class="ravlo-sidebar-logout-form">
      <button type="submit" class="ravlo-btn ghost sm ravlo-logout-btn sidebar-logout-full">
        <i class="lucide lucide-log-out"></i>
        <span>Logout</span>
      </button>
    </form>

  </div>

</div>
