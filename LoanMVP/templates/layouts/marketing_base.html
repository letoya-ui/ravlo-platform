<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>{% block title %}Ravlo{% endblock %}</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/marketing.css') }}">

</head>

<body>

<header class="topbar">

<div class="container topbar-inner">

<a href="/" class="brand">

<div class="brand-mark">R</div>

<div>
<div class="brand-title">Ravlo</div>
<div class="brand-sub">Investor Operating System</div>
</div>

</a>

<nav class="nav-links">

<a href="/">Home</a>
<a href="/about">About</a>
<a href="/enter">Enter</a>

</nav>

<div class="nav-actions">

<a href="/login" class="btn btn-ghost">Sign In</a>
<a href="/register" class="btn btn-primary">Enter Ravlo</a>

</div>

</div>

</header>


<main>

{% block content %}{% endblock %}

</main>


<footer class="footer">

<div class="container footer-inner">

<div>

<div class="brand-title">Ravlo</div>
<div class="brand-sub">A presence for people who build.</div>

</div>

<div class="footer-links">

<a href="/">Home</a>
<a href="/about">About</a>
<a href="/enter">Enter</a>

</div>

</div>

</footer>

</body>
</html>
