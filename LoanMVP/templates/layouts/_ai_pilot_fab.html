{# templates/layouts/_ai_pilot_fab.html #}
<div class="ravlo-ai-fab-wrap">
  <button
    type="button"
    class="ravlo-ai-fab"
    id="ravloAiPilotFab"
    onclick="toggleAiPilot()"
    aria-label="Open AI Pilot"
  >
    <i class="lucide lucide-sparkles"></i>
    <span>AI Pilot</span>
  </button>
</div>

<div class="ravlo-ai-panel" id="ravloAiPilotPanel" aria-hidden="true">
  <div class="ravlo-ai-panel-head">
    <div>
      <strong>AI Pilot</strong>
      <div class="ravlo-ai-panel-sub">Quick commands, notes, drafts, and suggestions.</div>
    </div>
    <button type="button" class="ravlo-ai-close" onclick="closeAiPilot()" aria-label="Close AI Pilot">
      <i class="lucide lucide-x"></i>
    </button>
  </div>

  <form method="POST" action="{{ url_for('vip.ai_pilot_command') }}" class="ravlo-ai-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <textarea
      name="command"
      rows="4"
      class="ravlo-ai-textarea"
      placeholder="Example: Email Sarah and say I’m sending comps tonight."
    ></textarea>

    <div class="ravlo-ai-actions">
      <button type="submit" class="ravlo-btn primary sm">
        Create Suggestion
      </button>
      <a href="{{ url_for('vip.ai_pilot') }}" class="ravlo-btn ghost sm">
        Open Full AI Pilot
      </a>
    </div>
  </form>

  <div class="ravlo-ai-quick-actions">
    <div class="ravlo-ai-quick-title">Quick ideas</div>
    <button type="button" class="ravlo-ai-chip" onclick="fillAiPilot('Email Sarah and say I’m sending comps tonight.')">
      Draft Email
    </button>
    <button type="button" class="ravlo-ai-chip" onclick="fillAiPilot('Text buyer I’m outside.')">
      Draft Text
    </button>
    <button type="button" class="ravlo-ai-chip" onclick="fillAiPilot('Create a follow-up for tomorrow morning.')">
      Follow-Up
    </button>
    <button type="button" class="ravlo-ai-chip" onclick="fillAiPilot('Log a $180 photo expense.')">
      Log Expense
    </button>
    <button type="button" class="ravlo-ai-chip" onclick="fillAiPilot('Add 24 miles and tolls from today’s showings.')">
      Log Mileage
    </button>
  </div>
</div>

<style>
  .ravlo-ai-fab-wrap {
    position: fixed;
    right: 20px;
    bottom: 20px;
    z-index: 1050;
  }

  .ravlo-ai-fab {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: none;
    border-radius: 999px;
    padding: 12px 16px;
    cursor: pointer;
    background: linear-gradient(135deg, #4f8cff, #7b61ff);
    color: #ffffff;
    box-shadow: 0 12px 32px rgba(79, 140, 255, 0.28);
    font-weight: 600;
  }

  .ravlo-ai-panel {
    position: fixed;
    right: 20px;
    bottom: 84px;
    width: min(420px, calc(100vw - 32px));
    background: rgba(14, 20, 28, 0.96);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 16px;
    z-index: 1051;
    box-shadow: 0 18px 48px rgba(0,0,0,0.35);
    backdrop-filter: blur(16px);
    display: none;
  }

  .ravlo-ai-panel.open {
    display: block;
  }

  .ravlo-ai-panel-head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: start;
    margin-bottom: 12px;
  }

  .ravlo-ai-panel-sub {
    color: #8ea4b7;
    font-size: 0.84rem;
    margin-top: 2px;
  }

  .ravlo-ai-close {
    background: transparent;
    border: none;
    color: #cfe1f4;
    cursor: pointer;
  }

  .ravlo-ai-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .ravlo-ai-textarea {
    width: 100%;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: #ffffff;
    padding: 12px;
    resize: vertical;
  }

  .ravlo-ai-textarea::placeholder {
    color: #8ea4b7;
  }

  .ravlo-ai-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .ravlo-ai-quick-actions {
    margin-top: 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .ravlo-ai-quick-title {
    width: 100%;
    color: #8ea4b7;
    font-size: 0.82rem;
    margin-bottom: 2px;
  }

  .ravlo-ai-chip {
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: #cfe1f4;
    border-radius: 999px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 0.84rem;
  }

  @media (max-width: 900px) {
    .ravlo-ai-fab-wrap {
      right: 14px;
      bottom: 14px;
    }

    .ravlo-ai-panel {
      right: 14px;
      bottom: 74px;
      width: calc(100vw - 28px);
    }
  }
</style>

<script>
  function toggleAiPilot() {
    const panel = document.getElementById("ravloAiPilotPanel");
    if (!panel) return;
    panel.classList.toggle("open");
    panel.setAttribute("aria-hidden", panel.classList.contains("open") ? "false" : "true");
  }

  function closeAiPilot() {
    const panel = document.getElementById("ravloAiPilotPanel");
    if (!panel) return;
    panel.classList.remove("open");
    panel.setAttribute("aria-hidden", "true");
  }

  function fillAiPilot(text) {
    const textarea = document.querySelector('#ravloAiPilotPanel textarea[name="command"]');
    if (!textarea) return;
    textarea.value = text;
    textarea.focus();
  }
</script>
