<div class="re-brand">
  <div class="re-mark"><span>RV</span></div>
  <div>
    <div class="re-brand-name">Ravlo</div>
    <div class="re-brand-sub">Processor OS</div>
  </div>
</div>

<nav class="re-nav">
  <div class="re-nav-group">
    <div class="re-nav-label">Workspace</div>

    <a href="{{ url_for('processor.dashboard') }}" class="re-nav-link {% if active_tab == 'dashboard' %}active{% endif %}">
      <i class="icon lucide lucide-layout-dashboard"></i>
      <span>Dashboard</span>
    </a>

    <a href="{{ url_for('processor.loan_queue') }}" class="re-nav-link {% if active_tab == 'pipeline' %}active{% endif %}">
      <i class="icon lucide lucide-git-branch"></i>
      <span>Queue</span>
    </a>

    <a href="{{ url_for('processor.documents') }}" class="re-nav-link {% if active_tab == 'documents' %}active{% endif %}">
      <i class="icon lucide lucide-folder-open"></i>
      <span>Documents</span>
    </a>

    <a href="{{ url_for('processor.messages') }}" class="re-nav-link {% if active_tab == 'messages' %}active{% endif %}">
      <i class="icon lucide lucide-messages-square"></i>
      <span>Messages</span>
    </a>
  </div>
</nav>

<div class="re-sidebar-foot">
  <div class="re-user-chip">
    <div class="re-user-avatar">
      {{ (current_user.first_name[0] if current_user.first_name else "P")|upper }}
    </div>
    <div class="re-user-meta">
      <div class="re-user-name">{{ current_user.first_name or "" }} {{ current_user.last_name or "" }}</div>
      <div class="re-user-role">Processor</div>
    </div>
  </div>
</div>
