{% if session.get('is_demo_mode') %}
<div style="position:sticky;top:0;z-index:9999;display:flex;align-items:center;justify-content:center;gap:14px;padding:8px 16px;background:linear-gradient(90deg,#7c3aed,#4f46e5);color:#fff;font-size:.82rem;font-weight:700;box-shadow:0 2px 10px rgba(0,0,0,.25);">
  <span>
    <i class="lucide lucide-drama" style="vertical-align:middle;margin-right:6px;"></i>
    Demo Mode — viewing as {{ (session.get('demo_role') or 'demo')|replace('_', ' ')|title }}
  </span>
  <form method="POST" action="{{ url_for('admin.demo_exit') }}" style="margin:0;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <button type="submit" style="background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:999px;padding:4px 14px;font-size:.78rem;font-weight:800;cursor:pointer;">
      Exit Demo Mode
    </button>
  </form>
</div>
{% endif %}
