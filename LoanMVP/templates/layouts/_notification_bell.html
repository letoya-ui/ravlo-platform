{% if current_user.is_authenticated %}
<a href="{{ url_for('notifications.dashboard') }}"
   aria-label="Notifications"
   style="position:relative;display:inline-flex;align-items:center;justify-content:center;
          width:36px;height:36px;border-radius:10px;color:inherit;text-decoration:none;
          border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);">
  <i class="lucide lucide-bell" style="width:18px;height:18px;"></i>
  {% if current_unread and current_unread > 0 %}
  <span style="position:absolute;top:-5px;right:-5px;background:#ff6b6b;color:#fff;
               border-radius:999px;font-size:.62rem;font-weight:700;min-width:16px;
               text-align:center;padding:1px 4px;line-height:1.3;">
    {{ current_unread if current_unread < 100 else '99+' }}
  </span>
  {% endif %}
</a>
{% endif %}
