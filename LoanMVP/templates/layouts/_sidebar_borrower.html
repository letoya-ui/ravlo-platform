<style>
.ravlo-sidebar {
  width: 280px;
  min-height: 100vh;
  background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
  border-right: 1px solid rgba(255,255,255,0.08);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 22px 16px;
  position: sticky;
  top: 0;
}

.ravlo-brand {
  margin-bottom: 24px;
}

.ravlo-brand-link {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: #fff;
}

.ravlo-mark {
  width: 46px;
  height: 46px;
  border-radius: 14px;
  display: grid;
  place-items: center;
  font-weight: 800;
  font-size: 20px;
  color: #fff;
  background: linear-gradient(135deg, #1d4ed8 0%, #38bdf8 100%);
  box-shadow: 0 10px 25px rgba(56, 189, 248, 0.22);
}

.ravlo-brand-title {
  font-size: 18px;
  font-weight: 800;
  line-height: 1.1;
  color: #f8fafc;
}

.ravlo-brand-sub {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 2px;
}

.ravlo-nav {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}

.ravlo-nav-link {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 14px;
  color: #cbd5e1;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.2s ease;
}

.ravlo-nav-link i {
  width: 18px;
  height: 18px;
}

.ravlo-nav-link:hover {
  background: rgba(255,255,255,0.06);
  color: #ffffff;
}

.ravlo-nav-link.active {
  background: linear-gradient(90deg, rgba(37,99,235,0.22), rgba(56,189,248,0.14));
  color: #ffffff;
  border: 1px solid rgba(56, 189, 248, 0.22);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
}

.ravlo-sidebar-footer {
  margin-top: 24px;
  border-top: 1px solid rgba(255,255,255,0.08);
  padding-top: 18px;
}

.ravlo-user-card {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.ravlo-user-avatar {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  display: grid;
  place-items: center;
  background: rgba(56, 189, 248, 0.16);
  color: #e0f2fe;
  font-weight: 800;
}

.ravlo-user-meta {
  min-width: 0;
}

.ravlo-user-name {
  font-size: 14px;
  font-weight: 700;
  color: #f8fafc;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.ravlo-user-role {
  font-size: 12px;
  color: #94a3b8;
}

.ravlo-logout-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border-radius: 14px;
  background: rgba(255,255,255,0.04);
  color: #fca5a5;
  text-decoration: none;
  font-weight: 600;
  transition: 0.2s ease;
}

.ravlo-logout-btn:hover {
  background: rgba(239,68,68,0.12);
  color: #fff;
}

@media (max-width: 992px) {
  .ravlo-sidebar {
    width: 100%;
    min-height: auto;
    position: relative;
    border-right: none;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
}

</style>


{% set ep = request.endpoint or "" %}

<aside class="ravlo-sidebar">
  <div class="ravlo-brand">
    <a href="{{ url_for('borrower.dashboard') }}" class="ravlo-brand-link">
      <div class="ravlo-mark">R</div>
      <div>
        <div class="ravlo-brand-title">Ravlo</div>
        <div class="ravlo-brand-sub">Borrower OS</div>
      </div>
    </a>
  </div>

  <nav class="ravlo-nav">

    <a href="{{ url_for('borrower.dashboard') }}"
       class="ravlo-nav-link {% if ep == 'borrower.dashboard' %}active{% endif %}">
      <i data-lucide="layout-dashboard"></i>
      <span>Dashboard</span>
    </a>

    <a href="{{ url_for('borrower.apply') }}"
       class="ravlo-nav-link {% if ep == 'borrower.apply' %}active{% endif %}">
      <i data-lucide="landmark"></i>
      <span>Apply</span>
    </a>

    <a href="{{ url_for('borrower.documents') }}"
       class="ravlo-nav-link {% if ep == 'borrower.documents' %}active{% endif %}">
      <i data-lucide="file-text"></i>
      <span>Capital Application</span>
    </a>

    <a href="{{ url_for('borrower.conditions') }}"
       class="ravlo-nav-link {% if ep == 'borrower.conditions' %}active{% endif %}">
      <i data-lucide="folder-open"></i>
      <span>Documents</span>
    </a>

       <a href="{{ url_for('borrower.property_search') }}"
       class="ravlo-nav-link {% if ep == 'borrower.property_search' %}active{% endif %}">
      <i data-lucide="search"></i>
      <span>Deal Finder</span>
    </a>

    <a href="{{ url_for('borrower.messages') }}"
       class="ravlo-nav-link {% if ep == 'borrower.messages' %}active{% endif %}">
      <i data-lucide="message-square"></i>
      <span>Messages</span>
    </a>

  </nav>

  <div class="ravlo-sidebar-footer">
    <div class="ravlo-user-card">
      <div class="ravlo-user-avatar">
        {{ current_user.first_name[0] if current_user.first_name else "B" }}
      </div>
      <div class="ravlo-user-meta">
        <div class="ravlo-user-name">
          {{ current_user.first_name }} {{ current_user.last_name }}
        </div>
        <div class="ravlo-user-role">Borrower</div>
      </div>
    </div>

    <a href="{{ url_for('auth.logout') }}" class="ravlo-logout-btn">
      <i data-lucide="log-out"></i>
      <span>Logout</span>
    </a>
  </div>
</aside>
