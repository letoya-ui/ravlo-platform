{% extends base_template %}

{% block title %}Ravlo • Security{% endblock %}
{% block page_title %}Security{% endblock %}
{% block page_subline %}Update your password and account security{% endblock %}

{% block content %}
<div style="max-width:520px;">
  <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:28px;">
    <form method="POST">
      {% if csrf_token %}
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      {% endif %}

      <div style="display:grid;gap:18px;">
        <div>
          <label style="display:block;font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted,#888);margin-bottom:6px;">Current Password</label>
          <input style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--text,#f4f8fc);font-size:.95rem;box-sizing:border-box;"
                 type="password" name="current_password" required>
        </div>

        <div>
          <label style="display:block;font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted,#888);margin-bottom:6px;">New Password</label>
          <input style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--text,#f4f8fc);font-size:.95rem;box-sizing:border-box;"
                 type="password" name="new_password" required>
        </div>

        <div>
          <label style="display:block;font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted,#888);margin-bottom:6px;">Confirm New Password</label>
          <input style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--text,#f4f8fc);font-size:.95rem;box-sizing:border-box;"
                 type="password" name="confirm_password" required>
        </div>
      </div>

      <div style="margin-top:24px;display:flex;gap:12px;align-items:center;">
        <button type="submit" style="padding:10px 22px;border-radius:10px;border:none;background:#3b82f6;color:#fff;font-weight:600;font-size:.9rem;cursor:pointer;">Update Password</button>
        <a href="{{ url_for('account.profile') }}" style="padding:10px 18px;border-radius:10px;border:1px solid rgba(255,255,255,.12);color:var(--muted,#888);font-size:.9rem;text-decoration:none;">Back to Profile</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
