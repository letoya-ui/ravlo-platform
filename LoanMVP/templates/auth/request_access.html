{% extends "layouts/ravlo_auth_base.html" %}
{% block title %}Request Access | Ravlo{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">

    <div class="brand-stack">
      <div class="wordmark">RAVLO</div>
      <div class="muted" style="text-align:center;">Request Investor Access</div>
    </div>

    <form class="auth-form" method="post">

      <label class="auth-label">First Name *</label>
      <div class="auth-input">
        <input name="first_name" required>
      </div>

      <label class="auth-label">Last Name *</label>
      <div class="auth-input">
        <input name="last_name" required>
      </div>

      <label class="auth-label">Email *</label>
      <div class="auth-input">
        <input type="email" name="email" required>
      </div>

      <label class="auth-label">Phone</label>
      <div class="auth-input">
        <input name="phone">
      </div>

      <label class="auth-label">Tell us about your investing goals</label>
      <div class="auth-input" style="height:90px;">
        <textarea name="notes" style="width:100%; height:100%; background:transparent; border:0; outline:0; color:white; padding:10px;"></textarea>
      </div>

      <button class="auth-btn" type="submit">Submit Request</button>

      <a class="auth-link" href="{{ url_for('auth.login') }}">
        Back to Login
      </a>

    </form>

  </div>
</div>
{% endblock %}
