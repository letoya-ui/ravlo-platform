{% extends "layouts/ravlo_auth_base.html" %}
{% block title %}Login | Ravlo{% endblock %}

{% block content %}
<section class="auth-plate" role="region" aria-label="Ravlo Login">
  <div class="auth-inner">

    <!-- Engraved Brand (No Image) -->
    <div class="ravlo-engraved">
      <div class="ravlo-mark" aria-hidden="true">RV</div>
      <div class="ravlo-word" aria-hidden="true">RAVLO</div>
      <div class="ravlo-cutline" aria-hidden="true"></div>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form" novalidate>
      
      {# ✅ Enable this if Flask-WTF is active #}
      {% if csrf_token %}
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      {% endif %}

      <!-- Email -->
      <label class="auth-label" for="email">Email</label>
      <div class="auth-field">
        <input 
          id="email"
          name="email"
          class="auth-input"
          type="email"
          autocomplete="email"
          placeholder="Email"
          required
        />
      </div>

      <!-- Password -->
      <label class="auth-label" for="password">Password</label>
      <div class="auth-field">
        <div class="auth-input-wrap">
          <input 
            id="password"
            name="password"
            class="auth-input"
            type="password"
            autocomplete="current-password"
            placeholder="Password"
            required
          />
          <button 
            class="auth-eye" 
            type="button"
            aria-label="Toggle password visibility"
            aria-controls="password"
            onclick="togglePw()"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"
                    fill="none" stroke="currentColor" stroke-width="2"/>
              <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
                    fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button class="auth-btn" type="submit">
        Sign In
      </button>

      <!-- Links -->
      <div class="auth-links">
        <a class="ravlo-auth-link"
           href="{{ url_for('auth.forgot_password') }}">
          Forgot password?
        </a>
      </div>

      <!-- Footer -->
      <div class="auth-footer">
        <div class="muted">Don’t have an account?</div>
        <a class="ravlo-auth-link"
           href="{{ url_for('auth.request_access') }}">
          Request access
        </a>
      </div>

    </form>

  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
function togglePw(){
  const el = document.getElementById('password');
  const isHidden = el.type === 'password';
  el.type = isHidden ? 'text' : 'password';
}
</script>
{% endblock %}
