<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ravlo Academy | AI Business Plan</title>

  <meta name="robots" content="noindex, nofollow">
  <meta name="csrf-token" content="{{ csrf_token() }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #080808; }
    #ravlo-business-plan-root { height: 100%; }

    .rbp-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #080808;
      color: #D4AF6A;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      gap: 10px;
    }
    .rbp-spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(212,175,106,0.2);
      border-top-color: #D4AF6A;
      border-radius: 50%;
      animation: rbp-spin 0.8s linear infinite;
    }
    @keyframes rbp-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="rbp-loader" class="rbp-loading">
    <div class="rbp-spinner"></div>
    Loading Ravlo Academy…
  </div>

  <div id="ravlo-business-plan-root"></div>

  {% include "layouts/_csrf_fetch.html" %}

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var loader = document.getElementById('rbp-loader');
      var attempts = 0;
      var check = setInterval(function () {
        attempts++;
        var root = document.getElementById('ravlo-business-plan-root');
        if ((root && root.childElementCount > 0) || attempts > 60) {
          if (loader) loader.style.display = 'none';
          clearInterval(check);
        }
      }, 200);
    });
  </script>

  <script type="text/babel"
          data-presets="react"
          src="{{ url_for('static', filename='js/ravlo_business_plan.jsx') }}">
  </script>

</body>
</html>
